# Command manifest for waldur-cli-generator.
#
# Single source of truth for what waldur-cli's command surface covers. Each
# `commands.*` value must be the exact `operationId` from Waldur's OpenAPI
# schema -- the generator parses that operation's real path/params/request
# shape from the schema directly (see src/schema.rs).
#
# Deliberately not 1:1 with Waldur's ~451 operations: only list/get/create/
# update/delete are covered as direct REST verbs. OpenStack tenant/instance/
# volume creation and deletion happen through Waldur's marketplace ordering
# flow instead -- those resources declare a `[group.resource.order]` block
# (offering_type) and get `provision`/`terminate` subcommands generated for
# that async order workflow rather than a direct REST create/delete. Other
# action-style operations (start/stop/attach/approve/...) aren't covered yet.
#
# `columns` lists the fields shown in the default human-readable table.

[[group]]
name = "openstack"
about = "Manage OpenStack resources"

  [[group.resource]]
  name = "tenant"
  about = "OpenStack tenants"
  columns = ["uuid", "name", "state", "customer_name"]
    [group.resource.commands]
    list = "openstack_tenants_list"
    get = "openstack_tenants_retrieve"
    update = "openstack_tenants_update"
    [group.resource.order]
    offering_type = "OpenStack.Tenant"

  [[group.resource]]
  name = "instance"
  about = "OpenStack instances (VMs)"
  columns = ["uuid", "name", "state", "project_name"]
    [group.resource.commands]
    list = "openstack_instances_list"
    get = "openstack_instances_retrieve"
    update = "openstack_instances_update"
    [group.resource.order]
    offering_type = "OpenStack.Instance"

  [[group.resource]]
  name = "volume"
  about = "OpenStack volumes"
  columns = ["uuid", "name", "state", "size"]
    [group.resource.commands]
    list = "openstack_volumes_list"
    get = "openstack_volumes_retrieve"
    update = "openstack_volumes_update"
    [group.resource.order]
    offering_type = "OpenStack.Volume"

  [[group.resource]]
  name = "network"
  about = "OpenStack networks"
  columns = ["uuid", "name", "state", "project_name"]
    [group.resource.commands]
    list = "openstack_networks_list"
    get = "openstack_networks_retrieve"
    update = "openstack_networks_update"
    delete = "openstack_networks_destroy"

  [[group.resource]]
  name = "subnet"
  about = "OpenStack subnets"
  columns = ["uuid", "name", "state", "cidr"]
    [group.resource.commands]
    list = "openstack_subnets_list"
    get = "openstack_subnets_retrieve"
    update = "openstack_subnets_update"
    delete = "openstack_subnets_destroy"

  [[group.resource]]
  name = "security-group"
  about = "OpenStack security groups"
  columns = ["uuid", "name", "state", "project_name"]
    [group.resource.commands]
    list = "openstack_security_groups_list"
    get = "openstack_security_groups_retrieve"
    update = "openstack_security_groups_update"
    delete = "openstack_security_groups_destroy"

  [[group.resource]]
  name = "floating-ip"
  about = "OpenStack floating IPs"
  columns = ["uuid", "address", "state", "project_name"]
    [group.resource.commands]
    list = "openstack_floating_ips_list"
    get = "openstack_floating_ips_retrieve"
    delete = "openstack_floating_ips_destroy"

